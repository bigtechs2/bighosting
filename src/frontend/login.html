<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – bighosting by bigmanjtech™</title>
  <meta name="description" content="Login to your bighosting account and manage your bots." />
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>" />
  <style>
    /* ==========================================
       Login Page Specific Styles
       ========================================== */
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 100px 24px 60px;
      background: var(--bg-primary);
    }

    .auth-container {
      width: 100%;
      max-width: 440px;
    }

    .auth-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      padding: 48px 40px;
      box-shadow: var(--shadow);
    }

    .auth-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .auth-header .logo-icon {
      font-size: 3rem;
      display: block;
      margin-bottom: 8px;
    }

    .auth-header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--text-primary);
    }

    .auth-header p {
      color: var(--text-muted);
      font-size: 0.95rem;
      margin-top: 4px;
    }

    .auth-header .brand {
      color: var(--accent);
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-weight: 600;
      font-size: 0.9rem;
      color: var(--text-primary);
      margin-bottom: 6px;
    }

    .form-group input {
      width: 100%;
      padding: 14px 16px;
      background: var(--bg-elevated);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-size: 1rem;
      transition: border-color var(--transition);
      outline: none;
    }

    .form-group input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .form-group input::placeholder {
      color: var(--text-muted);
      opacity: 0.6;
    }

    .form-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      font-size: 0.9rem;
    }

    .form-options label {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-muted);
      cursor: pointer;
    }

    .form-options label input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .form-options a {
      color: var(--accent);
      font-weight: 500;
      text-decoration: none;
    }

    .form-options a:hover {
      color: var(--accent-hover);
      text-decoration: underline;
    }

    .btn-auth {
      width: 100%;
      padding: 14px;
      font-size: 1.05rem;
      font-weight: 700;
      background: var(--accent);
      color: var(--text-inverse);
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all var(--transition);
    }

    .btn-auth:hover {
      background: var(--accent-hover);
      transform: translateY(-2px);
      box-shadow: 0 4px 20px var(--accent-glow);
    }

    .btn-auth:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .auth-footer {
      text-align: center;
      margin-top: 24px;
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    .auth-footer a {
      color: var(--accent);
      font-weight: 600;
      text-decoration: none;
    }

    .auth-footer a:hover {
      color: var(--accent-hover);
      text-decoration: underline;
    }

    .error-message {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #f87171;
      padding: 12px 16px;
      border-radius: var(--radius-sm);
      margin-bottom: 16px;
      font-size: 0.9rem;
      display: none;
    }

    .error-message.show {
      display: block;
    }

    .success-message {
      background: rgba(16, 185, 129, 0.15);
      border: 1px solid rgba(16, 185, 129, 0.3);
      color: var(--accent);
      padding: 12px 16px;
      border-radius: var(--radius-sm);
      margin-bottom: 16px;
      font-size: 0.9rem;
      display: none;
    }

    .success-message.show {
      display: block;
    }

    .loader {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid var(--text-inverse);
      border-radius: 50%;
      border-top-color: transparent;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Demo credentials hint */
    .demo-hint {
      background: var(--bg-elevated);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      margin-top: 16px;
      text-align: center;
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .demo-hint strong {
      color: var(--accent);
    }

    @media (max-width: 480px) {
      .auth-card {
        padding: 32px 20px;
      }
      .auth-header h1 {
        font-size: 1.5rem;
      }
      .form-options {
        flex-direction: column;
        gap: 12px;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>

  <!-- ==========================================
  NAVBAR (Minimal)
  ========================================== -->
  <nav class="navbar">
    <div class="container nav-container">
      <a href="/" class="nav-logo">
        <span class="logo-icon">🚀</span>
        <span>bighosting</span>
        <span class="logo-badge">™</span>
      </a>
      <ul class="nav-links">
        <li><a href="/">Home</a></li>
        <li><a href="/register.html" class="btn btn-primary">Sign Up</a></li>
      </ul>
    </div>
  </nav>

  <!-- ==========================================
  LOGIN FORM
  ========================================== -->
  <section class="auth-page">
    <div class="auth-container">
      <div class="auth-card">

        <!-- Header -->
        <div class="auth-header">
          <span class="logo-icon">🚀</span>
          <h1>Welcome Back</h1>
          <p>Login to your <span class="brand">bighosting</span> account</p>
        </div>

        <!-- Error / Success Messages -->
        <div class="error-message" id="errorMessage"></div>
        <div class="success-message" id="successMessage"></div>

        <!-- Login Form -->
        <form id="loginForm" novalidate>
          <div class="form-group">
            <label for="email">Email Address</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="you@example.com"
              required
              autocomplete="email"
            />
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Enter your password"
              required
              autocomplete="current-password"
              minlength="6"
            />
          </div>

          <div class="form-options">
            <label>
              <input type="checkbox" id="remember" />
              Remember me
            </label>
            <a href="#" id="forgotPassword">Forgot Password?</a>
          </div>

          <button type="submit" class="btn-auth" id="loginBtn">
            Login
          </button>
        </form>

        <!-- Footer -->
        <div class="auth-footer">
          Don't have an account? <a href="/register.html">Sign Up</a>
        </div>

        <!-- Demo Hint (Remove in production) -->
        <div class="demo-hint">
          🔑 Demo: <strong>admin@bighosting.com</strong> / <strong>Admin@123456</strong>
        </div>

        <!-- Business Contact -->
        <div class="auth-footer" style="margin-top: 16px; font-size: 0.8rem; color: var(--text-muted);">
          📞 Support: <strong style="color: var(--accent);">255636756591</strong>
        </div>

      </div>
    </div>
  </section>

  <!-- ==========================================
  FOOTER (Minimal)
  ========================================== -->
  <footer class="footer" style="padding: 24px 0; background: var(--bg-primary); border-top: 1px solid var(--border-color);">
    <div class="container">
      <div class="footer-bottom" style="border-top: none; padding-top: 0;">
        <span>© bighosting by bigmanjtech™</span>
        <span>📞 255636756591</span>
      </div>
    </div>
  </footer>

  <!-- ==========================================
  LOGIN SCRIPT
  ========================================== -->
  <script>
    (function() {
      const form = document.getElementById('loginForm');
      const emailInput = document.getElementById('email');
      const passwordInput = document.getElementById('password');
      const loginBtn = document.getElementById('loginBtn');
      const errorMsg = document.getElementById('errorMessage');
      const successMsg = document.getElementById('successMessage');
      const rememberCheck = document.getElementById('remember');

      // Load saved email if "Remember me" was checked
      const savedEmail = localStorage.getItem('bighosting_email');
      if (savedEmail) {
        emailInput.value = savedEmail;
        rememberCheck.checked = true;
      }

      // Hide messages on input
      emailInput.addEventListener('input', () => {
        errorMsg.classList.remove('show');
        successMsg.classList.remove('show');
      });
      passwordInput.addEventListener('input', () => {
        errorMsg.classList.remove('show');
        successMsg.classList.remove('show');
      });

      form.addEventListener('submit', async (e) => {
        e.preventDefault();

        // Clear old messages
        errorMsg.classList.remove('show');
        successMsg.classList.remove('show');

        const email = emailInput.value.trim();
        const password = passwordInput.value.trim();

        // Validate
        if (!email || !password) {
          errorMsg.textContent = 'Please fill in all fields.';
          errorMsg.classList.add('show');
          return;
        }

        if (password.length < 6) {
          errorMsg.textContent = 'Password must be at least 6 characters.';
          errorMsg.classList.add('show');
          return;
        }

        // Disable button & show loading
        loginBtn.disabled = true;
        loginBtn.innerHTML = '<span class="loader"></span> Logging in...';

        try {
          const response = await fetch('/api/auth/login', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
            },
            body: JSON.stringify({ email, password }),
          });

          const data = await response.json();

          if (!response.ok) {
            throw new Error(data.message || 'Login failed. Please try again.');
          }

          // Save token
          if (data.token) {
            localStorage.setItem('bighosting_token', data.token);
            localStorage.setItem('bighosting_user', JSON.stringify(data.user));

            // Save email if "Remember me"
            if (rememberCheck.checked) {
              localStorage.setItem('bighosting_email', email);
            } else {
              localStorage.removeItem('bighosting_email');
            }

            // Show success
            successMsg.textContent = '✅ Login successful! Redirecting...';
            successMsg.classList.add('show');

            // Redirect to dashboard
            setTimeout(() => {
              window.location.href = '/dashboard.html';
            }, 1500);
          } else {
            throw new Error('Invalid response from server.');
          }

        } catch (error) {
          errorMsg.textContent = error.message || 'Something went wrong. Please try again.';
          errorMsg.classList.add('show');
        } finally {
          loginBtn.disabled = false;
          loginBtn.textContent = 'Login';
        }
      });

      // Forgot Password (placeholder)
      document.getElementById('forgotPassword').addEventListener('click', (e) => {
        e.preventDefault();
        errorMsg.textContent = '📧 Password reset feature coming soon. Contact support at 255636756591.';
        errorMsg.classList.add('show');
      });

    })();
  </script>

</body>
</html>
