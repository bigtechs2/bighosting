<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – bighosting by bigmanjtech™</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>" />
  <style>
    /* ---- Override base styles for auth pages ---- */
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-primary);
      margin: 0;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    /* Animated background glow */
    body::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 30% 40%, rgba(16, 185, 129, 0.08) 0%, transparent 60%),
                  radial-gradient(circle at 70% 80%, rgba(16, 185, 129, 0.05) 0%, transparent 50%);
      animation: floatGlow 20s ease-in-out infinite alternate;
      z-index: 0;
    }

    @keyframes floatGlow {
      0% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(5%, 5%) scale(1.1); }
      100% { transform: translate(-5%, -5%) scale(0.9); }
    }

    .auth-container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 440px;
    }

    .auth-card {
      background: rgba(26, 28, 35, 0.75);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(46, 49, 60, 0.5);
      border-radius: 24px;
      padding: 48px 40px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255,255,255,0.05);
      transition: transform 0.3s ease;
    }

    .auth-card:hover {
      transform: translateY(-2px);
    }

    .auth-header {
      text-align: center;
      margin-bottom: 36px;
    }

    .auth-header .logo-icon {
      font-size: 3.2rem;
      display: block;
      margin-bottom: 8px;
      filter: drop-shadow(0 0 20px rgba(16, 185, 129, 0.3));
    }

    .auth-header h1 {
      font-size: 2rem;
      font-weight: 700;
      color: var(--text-primary);
      margin: 0;
      letter-spacing: -0.5px;
    }

    .auth-header p {
      color: var(--text-muted);
      font-size: 0.95rem;
      margin-top: 6px;
    }

    .auth-header .brand {
      color: var(--accent);
      font-weight: 600;
    }

    .form-group {
      margin-bottom: 22px;
      position: relative;
    }

    .form-group label {
      display: block;
      font-weight: 500;
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 6px;
      letter-spacing: 0.3px;
    }

    .form-group input {
      width: 100%;
      padding: 14px 16px;
      background: rgba(37, 40, 50, 0.8);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      color: var(--text-primary);
      font-size: 1rem;
      transition: all 0.3s ease;
      outline: none;
      box-sizing: border-box;
    }

    .form-group input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.15);
      background: var(--bg-elevated);
    }

    .form-group input::placeholder {
      color: var(--text-muted);
      opacity: 0.5;
    }

    .form-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
      font-size: 0.9rem;
    }

    .form-options label {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-muted);
      cursor: pointer;
      font-weight: 400;
    }

    .form-options label input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: var(--accent);
      cursor: pointer;
      border-radius: 4px;
      border: 1px solid var(--border-color);
      background: var(--bg-elevated);
    }

    .form-options a {
      color: var(--accent);
      font-weight: 500;
      text-decoration: none;
      transition: color 0.3s;
    }

    .form-options a:hover {
      color: var(--accent-hover);
      text-decoration: underline;
    }

    .btn-auth {
      width: 100%;
      padding: 16px;
      font-size: 1.05rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-hover) 100%);
      color: var(--text-inverse);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .btn-auth:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(16, 185, 129, 0.4);
    }

    .btn-auth:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none !important;
    }

    .btn-auth .loader {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid var(--text-inverse);
      border-radius: 50%;
      border-top-color: transparent;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .auth-footer {
      text-align: center;
      margin-top: 28px;
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    .auth-footer a {
      color: var(--accent);
      font-weight: 600;
      text-decoration: none;
      transition: color 0.3s;
    }

    .auth-footer a:hover {
      color: var(--accent-hover);
      text-decoration: underline;
    }

    .error-message {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #f87171;
      padding: 12px 16px;
      border-radius: 12px;
      margin-bottom: 18px;
      font-size: 0.9rem;
      display: none;
    }

    .error-message.show {
      display: block;
    }

    .success-message {
      background: rgba(16, 185, 129, 0.15);
      border: 1px solid rgba(16, 185, 129, 0.3);
      color: var(--accent);
      padding: 12px 16px;
      border-radius: 12px;
      margin-bottom: 18px;
      font-size: 0.9rem;
      display: none;
    }

    .success-message.show {
      display: block;
    }

    .support-section {
      margin-top: 28px;
      padding-top: 24px;
      border-top: 1px solid var(--border-color);
      text-align: center;
    }

    .support-section .support-title {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
    }

    .support-section a {
      color: var(--accent);
      text-decoration: none;
      transition: color 0.3s;
      display: inline-block;
      margin: 0 8px;
    }

    .support-section a:hover {
      color: var(--accent-hover);
    }

    /* Responsive */
    @media (max-width: 480px) {
      .auth-card {
        padding: 32px 20px;
        border-radius: 16px;
      }
      .auth-header h1 {
        font-size: 1.6rem;
      }
      .form-options {
        flex-direction: column;
        gap: 12px;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>

  <div class="auth-container">
    <div class="auth-card">

      <!-- Header -->
      <div class="auth-header">
        <span class="logo-icon">🚀</span>
        <h1>Welcome Back</h1>
        <p>Sign in to your <span class="brand">bighosting</span> account</p>
      </div>

      <!-- Error / Success Messages -->
      <div class="error-message" id="errorMessage"></div>
      <div class="success-message" id="successMessage"></div>

      <!-- Login Form -->
      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input
            type="email"
            id="email"
            placeholder="you@example.com"
            required
            autocomplete="email"
          />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            placeholder="Enter your password"
            required
            autocomplete="current-password"
            minlength="6"
          />
        </div>

        <div class="form-options">
          <label>
            <input type="checkbox" id="remember" />
            Remember me
          </label>
          <a id="forgotPasswordLink">Forgot Password?</a>
        </div>

        <button type="submit" class="btn-auth" id="loginBtn">
          Sign In
        </button>
      </form>

      <!-- Footer -->
      <div class="auth-footer">
        Don't have an account? <a href="/register.html">Create one now</a>
      </div>

      <!-- Support -->
      <div class="support-section">
        <div class="support-title">📞 Need help?</div>
        <a href="mailto:bigmanj.tech@gmail.com">✉️ Email</a>
        <span style="color: var(--text-muted);">•</span>
        <a href="https://wa.me/255636756591" target="_blank">💬 WhatsApp</a>
      </div>

    </div>
  </div>

  <!-- Forgot Password Modal (keep same as before) -->
  <!-- ... (you can keep the modal from previous version, or we can simplify) -->

  <!-- Script -->
  <script>
    // Keep your existing login logic here
    // (same as before, but you can improve it with better UX)
  </script>

</body>
</html>
