<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up – bighosting by bigmanjtech™</title>
  <meta name="description" content="Create your bighosting account and deploy your bot instantly." />
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>" />
  <style>
    /* ==========================================
       Register Page Specific Styles
       ========================================== */
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 100px 24px 60px;
      background: var(--bg-primary);
    }

    .auth-container {
      width: 100%;
      max-width: 440px;
    }

    .auth-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      padding: 48px 40px;
      box-shadow: var(--shadow);
    }

    .auth-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .auth-header .logo-icon {
      font-size: 3rem;
      display: block;
      margin-bottom: 8px;
    }

    .auth-header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--text-primary);
    }

    .auth-header p {
      color: var(--text-muted);
      font-size: 0.95rem;
      margin-top: 4px;
    }

    .auth-header .brand {
      color: var(--accent);
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      font-weight: 600;
      font-size: 0.9rem;
      color: var(--text-primary);
      margin-bottom: 6px;
    }

    .form-group input {
      width: 100%;
      padding: 14px 16px;
      background: var(--bg-elevated);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-size: 1rem;
      transition: border-color var(--transition);
      outline: none;
    }

    .form-group input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .form-group input::placeholder {
      color: var(--text-muted);
      opacity: 0.6;
    }

    .form-group .password-hint {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .form-group .password-hint.valid {
      color: var(--accent);
    }

    .form-group .password-hint.invalid {
      color: #f87171;
    }

    .btn-auth {
      width: 100%;
      padding: 14px;
      font-size: 1.05rem;
      font-weight: 700;
      background: var(--accent);
      color: var(--text-inverse);
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all var(--transition);
      margin-top: 8px;
    }

    .btn-auth:hover {
      background: var(--accent-hover);
      transform: translateY(-2px);
      box-shadow: 0 4px 20px var(--accent-glow);
    }

    .btn-auth:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .auth-footer {
      text-align: center;
      margin-top: 24px;
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    .auth-footer a {
      color: var(--accent);
      font-weight: 600;
      text-decoration: none;
    }

    .auth-footer a:hover {
      color: var(--accent-hover);
      text-decoration: underline;
    }

    .error-message {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #f87171;
      padding: 12px 16px;
      border-radius: var(--radius-sm);
      margin-bottom: 16px;
      font-size: 0.9rem;
      display: none;
    }

    .error-message.show {
      display: block;
    }

    .success-message {
      background: rgba(16, 185, 129, 0.15);
      border: 1px solid rgba(16, 185, 129, 0.3);
      color: var(--accent);
      padding: 12px 16px;
      border-radius: var(--radius-sm);
      margin-bottom: 16px;
      font-size: 0.9rem;
      display: none;
    }

    .success-message.show {
      display: block;
    }

    .loader {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid var(--text-inverse);
      border-radius: 50%;
      border-top-color: transparent;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .terms {
      font-size: 0.85rem;
      color: var(--text-muted);
      text-align: center;
      margin-top: 16px;
    }

    .terms a {
      color: var(--accent);
    }

    @media (max-width: 480px) {
      .auth-card {
        padding: 32px 20px;
      }
      .auth-header h1 {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>

  <!-- ==========================================
  NAVBAR (Minimal)
  ========================================== -->
  <nav class="navbar">
    <div class="container nav-container">
      <a href="/" class="nav-logo">
        <span class="logo-icon">🚀</span>
        <span>bighosting</span>
        <span class="logo-badge">™</span>
      </a>
      <ul class="nav-links">
        <li><a href="/">Home</a></li>
        <li><a href="/login.html" class="btn btn-outline">Login</a></li>
      </ul>
    </div>
  </nav>

  <!-- ==========================================
  REGISTER FORM
  ========================================== -->
  <section class="auth-page">
    <div class="auth-container">
      <div class="auth-card">

        <!-- Header -->
        <div class="auth-header">
          <span class="logo-icon">🚀</span>
          <h1>Create Account</h1>
          <p>Start hosting your bots with <span class="brand">bighosting</span></p>
        </div>

        <!-- Error / Success Messages -->
        <div class="error-message" id="errorMessage"></div>
        <div class="success-message" id="successMessage"></div>

        <!-- Register Form -->
        <form id="registerForm" novalidate>
          <div class="form-group">
            <label for="name">Full Name</label>
            <input
              type="text"
              id="name"
              name="name"
              placeholder="John Doe"
              required
              autocomplete="name"
            />
          </div>

          <div class="form-group">
            <label for="email">Email Address</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="you@example.com"
              required
              autocomplete="email"
            />
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Create a strong password"
              required
              autocomplete="new-password"
              minlength="6"
            />
            <div class="password-hint" id="passwordHint">🔒 Min 6 characters</div>
          </div>

          <button type="submit" class="btn-auth" id="registerBtn">
            Create Account
          </button>
        </form>

        <!-- Terms -->
        <div class="terms">
          By signing up, you agree to our <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.
        </div>

        <!-- Footer -->
        <div class="auth-footer">
          Already have an account? <a href="/login.html">Sign In</a>
        </div>

        <!-- Business Contact -->
        <div class="auth-footer" style="margin-top: 16px; font-size: 0.8rem; color: var(--text-muted);">
          📞 Support: <strong style="color: var(--accent);">255636756591</strong>
        </div>

      </div>
    </div>
  </section>

  <!-- ==========================================
  FOOTER (Minimal)
  ========================================== -->
  <footer class="footer" style="padding: 24px 0; background: var(--bg-primary); border-top: 1px solid var(--border-color);">
    <div class="container">
      <div class="footer-bottom" style="border-top: none; padding-top: 0;">
        <span>© bighosting by bigmanjtech™</span>
        <span>📞 255636756591</span>
      </div>
    </div>
  </footer>

  <!-- ==========================================
  REGISTER SCRIPT
  ========================================== -->
  <script>
    (function() {
      const form = document.getElementById('registerForm');
      const nameInput = document.getElementById('name');
      const emailInput = document.getElementById('email');
      const passwordInput = document.getElementById('password');
      const passwordHint = document.getElementById('passwordHint');
      const registerBtn = document.getElementById('registerBtn');
      const errorMsg = document.getElementById('errorMessage');
      const successMsg = document.getElementById('successMessage');

      // Password strength indicator
      passwordInput.addEventListener('input', () => {
        const len = passwordInput.value.length;
        if (len === 0) {
          passwordHint.textContent = '🔒 Min 6 characters';
          passwordHint.className = 'password-hint';
        } else if (len < 6) {
          passwordHint.textContent = '⚠️ Too short — min 6 characters';
          passwordHint.className = 'password-hint invalid';
        } else if (len < 10) {
          passwordHint.textContent = '👍 Good — add more characters for strength';
          passwordHint.className = 'password-hint valid';
        } else {
          passwordHint.textContent = '✅ Strong password!';
          passwordHint.className = 'password-hint valid';
        }
      });

      // Hide messages on input
      nameInput.addEventListener('input', () => {
        errorMsg.classList.remove('show');
        successMsg.classList.remove('show');
      });
      emailInput.addEventListener('input', () => {
        errorMsg.classList.remove('show');
        successMsg.classList.remove('show');
      });
      passwordInput.addEventListener('input', () => {
        errorMsg.classList.remove('show');
        successMsg.classList.remove('show');
      });

      form.addEventListener('submit', async (e) => {
        e.preventDefault();

        // Clear old messages
        errorMsg.classList.remove('show');
        successMsg.classList.remove('show');

        const name = nameInput.value.trim();
        const email = emailInput.value.trim();
        const password = passwordInput.value.trim();

        // Validate
        if (!name || !email || !password) {
          errorMsg.textContent = 'Please fill in all fields.';
          errorMsg.classList.add('show');
          return;
        }

        if (name.length < 2) {
          errorMsg.textContent = 'Name must be at least 2 characters.';
          errorMsg.classList.add('show');
          return;
        }

        if (password.length < 6) {
          errorMsg.textContent = 'Password must be at least 6 characters.';
          errorMsg.classList.add('show');
          return;
        }

        // Disable button & show loading
        registerBtn.disabled = true;
        registerBtn.innerHTML = '<span class="loader"></span> Creating account...';

        try {
          const response = await fetch('/api/auth/register', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
            },
            body: JSON.stringify({ name, email, password }),
          });

          const data = await response.json();

          if (!response.ok) {
            throw new Error(data.message || 'Registration failed. Please try again.');
          }

          // Show success
          successMsg.textContent = '✅ Account created successfully! Redirecting to login...';
          successMsg.classList.add('show');

          // Redirect to login
          setTimeout(() => {
            window.location.href = '/login.html';
          }, 2000);

        } catch (error) {
          errorMsg.textContent = error.message || 'Something went wrong. Please try again.';
          errorMsg.classList.add('show');
        } finally {
          registerBtn.disabled = false;
          registerBtn.textContent = 'Create Account';
        }
      });

    })();
  </script>

</body>
</html>
