<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Log In | ©big hosting by bigmanjtech ™</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, -apple-system, sans-serif; }
        body { background: #0a0a0f; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .card { background: #14141e; border: 1px solid #1f1f2e; border-radius: 24px; padding: 40px 32px; max-width: 440px; width: 100%; }
        .brand { text-align: center; margin-bottom: 28px; }
        .brand h1 { font-size: 28px; color: #fff; }
        .brand h1 span { color: #8b5cf6; }
        .brand small { display: block; font-size: 13px; color: #a1a1aa; margin-top: 2px; }
        h2 { color: #fff; font-size: 22px; margin-bottom: 6px; }
        .sub { color: #a1a1aa; font-size: 14px; margin-bottom: 24px; }
        .form-group { margin-bottom: 18px; }
        label { display: block; font-size: 14px; font-weight: 600; color: #e4e4e7; margin-bottom: 4px; }
        input { width: 100%; padding: 12px 14px; background: #1a1a2a; border: 1px solid #2a2a3e; border-radius: 10px; color: #fff; font-size: 15px; outline: none; transition: 0.2s; }
        input:focus { border-color: #8b5cf6; }
        .btn { width: 100%; padding: 14px; background: #8b5cf6; color: #fff; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .btn:hover { background: #7c3aed; }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .status { margin-top: 14px; font-size: 14px; text-align: center; }
        .switch { text-align: center; margin-top: 20px; font-size: 14px; color: #a1a1aa; }
        .switch a { color: #8b5cf6; text-decoration: none; font-weight: 600; }
        .forgot { text-align: right; margin-top: 4px; }
        .forgot a { color: #6a6a7e; font-size: 13px; text-decoration: none; }
        .forgot a:hover { color: #8b5cf6; }
        .footer-copy { text-align: center; margin-top: 24px; font-size: 12px; color: #4a4a5e; border-top: 1px solid #1f1f2e; padding-top: 20px; }
        .demo-hint { background: #1a142b; border: 1px solid #2a1a4e; border-radius: 10px; padding: 12px 16px; margin-bottom: 20px; font-size: 13px; color: #a1a1aa; text-align: center; }
        .demo-hint strong { color: #d946ef; }
    </style>
</head>
<body>
    <div class="card">
        <div class="brand">
            <h1>©big hosting</h1>
            <small>by bigmanjtech ™</small>
        </div>

        <h2>Welcome Back</h2>
        <p class="sub">Log in to manage your bots.</p>

        <!-- Demo hint (remove later) -->
        <div class="demo-hint">
            🔐 <strong>Demo:</strong> Use any email + password (min 8 chars) — backend coming soon!
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="you@example.com" required />
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter your password" required />
            </div>

            <div class="forgot">
                <a href="#">Forgot password?</a>
            </div>

            <button type="submit" class="btn" id="loginBtn">Log In 🔑</button>
            <div id="loginStatus" class="status"></div>
        </form>

        <div class="switch">
            Don't have an account? <a href="/register.html">Sign Up</a>
        </div>

        <div class="footer-copy">
            &copy; 2026 big hosting by bigmanjtech &trade;
        </div>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const statusDiv = document.getElementById('loginStatus');
        const btn = document.getElementById('loginBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            statusDiv.innerHTML = '';
            btn.disabled = true;
            btn.textContent = 'Logging in...';

            const payload = {
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
            };

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                });
                const data = await res.json();

                if (res.ok) {
                    statusDiv.style.color = '#4ade80';
                    statusDiv.innerHTML = '✅ Login successful! Redirecting to dashboard...';
                    // Save token to localStorage for future requests
                    if (data.token) localStorage.setItem('token', data.token);
                    setTimeout(() => window.location.href = '/dashboard.html', 1500);
                } else {
                    statusDiv.style.color = '#f87171';
                    statusDiv.innerHTML = '❌ ' + (data.error || 'Invalid email or password.');
                }
            } catch (err) {
                statusDiv.style.color = '#f87171';
                statusDiv.innerHTML = '❌ Network error. Check your connection.';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Log In 🔑';
            }
        });
    </script>
</body>
</html>
