<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Sign Up | ©big hosting by bigmanjtech ™</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, -apple-system, sans-serif; }
        body { background: #0a0a0f; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .card { background: #14141e; border: 1px solid #1f1f2e; border-radius: 24px; padding: 40px 32px; max-width: 480px; width: 100%; }
        .brand { text-align: center; margin-bottom: 24px; }
        .brand h1 { font-size: 28px; color: #fff; }
        .brand h1 span { color: #8b5cf6; }
        .brand small { display: block; font-size: 13px; color: #a1a1aa; margin-top: 2px; }
        h2 { color: #fff; font-size: 22px; margin-bottom: 6px; }
        .sub { color: #a1a1aa; font-size: 14px; margin-bottom: 24px; }
        .form-group { margin-bottom: 16px; }
        label { display: block; font-size: 14px; font-weight: 600; color: #e4e4e7; margin-bottom: 4px; }
        input, select { width: 100%; padding: 12px 14px; background: #1a1a2a; border: 1px solid #2a2a3e; border-radius: 10px; color: #fff; font-size: 15px; outline: none; transition: 0.2s; }
        input:focus, select:focus { border-color: #8b5cf6; }
        .hidden { display: none; }
        .phone-wrapper { display: flex; align-items: center; background: #1a1a2a; border: 1px solid #2a2a3e; border-radius: 10px; overflow: hidden; }
        .phone-wrapper .code { background: #0a0a0f; padding: 12px 12px; color: #a1a1aa; font-weight: 600; border-right: 1px solid #2a2a3e; }
        .phone-wrapper input { border: none; border-radius: 0; background: transparent; padding-left: 8px; }
        .phone-wrapper input:focus { border-color: transparent; }
        .checkbox-group { display: flex; align-items: flex-start; gap: 10px; margin: 16px 0; }
        .checkbox-group input { width: 18px; height: 18px; margin-top: 2px; flex-shrink: 0; }
        .checkbox-group label { font-weight: 400; font-size: 13px; color: #a1a1aa; }
        .checkbox-group a { color: #8b5cf6; text-decoration: none; }
        .btn { width: 100%; padding: 14px; background: #8b5cf6; color: #fff; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .btn:hover { background: #7c3aed; }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .status { margin-top: 14px; font-size: 14px; text-align: center; }
        .switch { text-align: center; margin-top: 20px; font-size: 14px; color: #a1a1aa; }
        .switch a { color: #8b5cf6; text-decoration: none; font-weight: 600; }
        .footer-copy { text-align: center; margin-top: 24px; font-size: 12px; color: #4a4a5e; border-top: 1px solid #1f1f2e; padding-top: 20px; }
        small.note { display: block; color: #6a6a7e; font-size: 11px; margin-top: 4px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="brand">
            <h1>©big hosting</h1>
            <small>by bigmanjtech ™</small>
        </div>

        <h2>Create Your Account</h2>
        <p class="sub">Deploy your bots in seconds. Pay with Mobile Money or Card.</p>

        <form id="registerForm">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="fullName" placeholder="e.g., Hamza Juma" required />
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="you@example.com" required />
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Min 8 characters" minlength="8" required />
            </div>

            <!-- Country Dropdown -->
            <div class="form-group">
                <label>Country</label>
                <select id="country" required>
                    <option value="">-- Select your country --</option>
                    <option value="Tanzania">🇹🇿 Tanzania</option>
                    <option value="Kenya">🇰🇪 Kenya</option>
                    <option value="Uganda">🇺🇬 Uganda</option>
                    <option value="Nigeria">🇳🇬 Nigeria</option>
                    <option value="South Africa">🇿🇦 South Africa</option>
                    <option value="United States">🇺🇸 United States</option>
                    <option value="United Kingdom">🇬🇧 United Kingdom</option>
                    <option value="Other">🌍 Other</option>
                </select>
            </div>

            <!-- Phone Number (only shows for Tanzania) -->
            <div class="form-group hidden" id="phoneGroup">
                <label>Mobile Number (for M-Pesa / Tigo Pesa)</label>
                <div class="phone-wrapper">
                    <span class="code">+255</span>
                    <input type="tel" id="phone" placeholder="712 345 678" />
                </div>
                <small class="note">We'll send payment requests to this number.</small>
            </div>

            <!-- Terms -->
            <div class="checkbox-group">
                <input type="checkbox" id="terms" required />
                <label for="terms">I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.</label>
            </div>

            <button type="submit" class="btn" id="registerBtn">Create Account 🚀</button>
            <div id="registerStatus" class="status"></div>
        </form>

        <div class="switch">
            Already have an account? <a href="/login.html">Log In</a>
        </div>

        <div class="footer-copy">
            &copy; 2026 big hosting by bigmanjtech &trade;
        </div>
    </div>

    <script>
        const countrySelect = document.getElementById('country');
        const phoneGroup = document.getElementById('phoneGroup');
        const phoneInput = document.getElementById('phone');
        const form = document.getElementById('registerForm');
        const statusDiv = document.getElementById('registerStatus');
        const btn = document.getElementById('registerBtn');

        // Show phone field only for Tanzania
        countrySelect.addEventListener('change', function () {
            if (this.value === 'Tanzania') {
                phoneGroup.classList.remove('hidden');
                phoneInput.required = true;
            } else {
                phoneGroup.classList.add('hidden');
                phoneInput.required = false;
                phoneInput.value = '';
            }
        });

        // Handle form submission
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            statusDiv.innerHTML = '';
            btn.disabled = true;
            btn.textContent = 'Creating...';

            const payload = {
                full_name: document.getElementById('fullName').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                country: countrySelect.value,
                phone: phoneInput.value || null,
            };

            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                });
                const data = await res.json();

                if (res.ok) {
                    statusDiv.style.color = '#4ade80';
                    statusDiv.innerHTML = '✅ Account created! Redirecting to login...';
                    setTimeout(() => window.location.href = '/login.html', 1500);
                } else {
                    statusDiv.style.color = '#f87171';
                    statusDiv.innerHTML = '❌ ' + (data.error || 'Registration failed. Try again.');
                }
            } catch (err) {
                statusDiv.style.color = '#f87171';
                statusDiv.innerHTML = '❌ Network error. Check your connection.';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Create Account 🚀';
            }
        });
    </script>
</body>
</html>
